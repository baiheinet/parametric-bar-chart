<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234F46E5' width='100' height='100' rx='10'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='16' font-weight='bold'>P6</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primavera P6 资源加载曲线</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Primavera P6 资源加载曲线</h1>
        <p>12 种曲线类型完整百分比数据表 — 按工期百分比（Duration %）以 5% 为间隔定义</p>
      </header>
      <main>
        <aside id="controls"></aside>
        <section id="chart-container">
          <canvas id="chart"></canvas>
          <div id="tooltip"></div>
        </section>
      </main>
      <footer>
        <button id="export-png" class="btn">导出 PNG</button>
        <button id="export-csv" class="btn">导出 CSV</button>
        <button id="print-data" class="btn">复制数据</button>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
